<!DOCTYPE html>

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root{--p:#0d9488;--pd:#0f766e;--pl:#ccfbf1;--pb:#f0fdfa;--ac:#06b6d4;--dn:#ef4444;--wn:#f59e0b;--sc:#10b981;--sb:#0f172a;--sh:#1e293b;--st:#94a3b8;--bg:#f8fafc;--card:#fff;--bd:#e2e8f0;--tx:#0f172a;--tm:#64748b;--tl:#94a3b8}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx)}
    .app{display:flex;height:100vh;overflow:hidden}
    .sidebar{background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s;overflow:hidden}
    .sidebar.open{width:252px}.sidebar.closed{width:66px}
    .sb-logo{display:flex;align-items:center;gap:10px;padding:18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
    .sb-logo-icon{width:34px;height:34px;background:var(--p);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sb-logo-name{font-size:15px;font-weight:700;color:#fff;white-space:nowrap}
    .sb-logo-sub{font-size:10px;color:var(--st);white-space:nowrap}
    .sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
    .sb-section{font-size:10px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 3px;white-space:nowrap;overflow:hidden}
    .nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;cursor:pointer;margin-bottom:1px;transition:all .15s;border:none;background:none;width:100%;color:var(--st);font-size:13px;font-weight:500;text-align:left;white-space:nowrap}
    .nav-item:hover{background:var(--sh);color:#fff}
    .nav-item.active{background:var(--p);color:#fff}
    .nav-label{flex:1}
    .nav-badge{background:#dc2626;color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px}
    .sb-footer{padding:10px 8px;border-top:1px solid rgba(255,255,255,.08)}
    .user-row{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .15s}
    .user-row:hover{background:var(--sh)}
    .uavatar{width:30px;height:30px;background:linear-gradient(135deg,var(--p),var(--ac));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
    .uname{color:#fff;font-size:12px;font-weight:600;white-space:nowrap}
    .urole{color:var(--st);font-size:11px;white-space:nowrap}
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden}
    .topbar{background:#fff;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:58px;flex-shrink:0;gap:12px}
    .search-wrap{position:relative}
    .search-input{background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:8px 12px 8px 34px;font-size:13px;width:260px;outline:none;color:var(--tx);transition:all .15s}
    .search-input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
    .search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--tl)}
    .tb-actions{display:flex;align-items:center;gap:6px}
    .ico-btn{width:34px;height:34px;border-radius:9px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tm);transition:background .15s;position:relative}
    .ico-btn:hover{background:var(--bg)}
    .ndot{position:absolute;top:5px;right:5px;width:7px;height:7px;background:var(--dn);border-radius:50%;border:2px solid #fff}
    .tb-div{width:1px;height:24px;background:var(--bd);margin:0 2px}
    .tb-user{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:8px;cursor:pointer;transition:background .15s}
    .tb-user:hover{background:var(--bg)}
    .tb-av{width:30px;height:30px;background:linear-gradient(135deg,var(--p),var(--ac));border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700}
    .content{flex:1;overflow-y:auto;padding:22px}
    .card{background:#fff;border-radius:12px;border:1px solid var(--bd)}
    .card-p{padding:20px}
    .kpi{background:#fff;border-radius:14px;padding:18px;border:1px solid var(--bd);transition:transform .15s,box-shadow .15s}
    .kpi:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.07)}
    .kpi-ico{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center}
    .kpi-val{font-size:26px;font-weight:700;margin-top:10px}
    .kpi-lbl{font-size:12px;color:var(--tm);margin-top:3px}
    .kpi-trend{font-size:11px;font-weight:600;display:flex;align-items:center;gap:2px;margin-top:4px}
    .trend-up{color:var(--sc)}.trend-dn{color:var(--dn)}
    .badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:500;white-space:nowrap}
    .bd{background:#f1f5f9;color:#475569}.bp{background:#dbeafe;color:#1d4ed8}.bs{background:#d1fae5;color:#065f46}
    .bw{background:#fef3c7;color:#92400e}.br{background:#fee2e2;color:#991b1b}.bpu{background:#f3e8ff;color:#6b21a8}
    .bt{background:#ccfbf1;color:#134e4a}.bi{background:#cffafe;color:#155e75}

    tbody tr:hover{background:#f8fafc}
    tbody tr:last-child{border-bottom:none}
    td{padding:11px 14px;font-size:13px;vertical-align:middle}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .lbl{font-size:12px;font-weight:500;color:var(--tx)}
    .inp{border:1px solid var(--bd);border-radius:8px;padding:9px 11px;font-size:13px;outline:none;color:var(--tx);background:#fff;transition:all .15s;font-family:inherit;width:100%}
    .inp:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(13,148,136,.12)}
    textarea.inp{resize:vertical}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:inherit}
    .btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}
    .btn-d{background:#dc2626;color:#fff}.btn-d:hover{background:#b91c1c}
    .btn-g{background:transparent;color:var(--tm);border:1px solid var(--bd)}.btn-g:hover{background:var(--bg)}
    .btn-tg{background:transparent;color:var(--p);border:1px solid var(--p)}.btn-tg:hover{background:var(--pb)}
    .btn-purple{background:#7c3aed;color:#fff}.btn-purple:hover{background:#6d28d9}
    .btn-red{background:#dc2626;color:#fff}.btn-red:hover{background:#b91c1c}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-sm{padding:6px 11px;font-size:12px}
    .modal-ov{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(3px)}

    .pt{font-size:20px;font-weight:700}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}

    .email-time{font-size:11px;color:var(--tl);white-space:nowrap}

    .alert-e{background:#fef2f2;border:1px solid #fecaca;color:#991b1b}
    .alert-i{background:#f0fdfa;border:1px solid #99f6e4;color:#134e4a}

    .login-tag{color:rgba(255,255,255,.65);font-size:15px;margin-bottom:44px}
    .login-feat{display:flex;flex-direction:column;gap:18px}
    .login-feat-row{display:flex;align-items:flex-start;gap:12px}
    .login-feat-ico{width:34px;height:34px;background:rgba(255,255,255,.12);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .login-feat h4{color:#fff;font-size:13px;font-weight:600;margin-bottom:2px}
    .login-feat p{color:rgba(255,255,255,.55);font-size:12px}
    .login-deco{position:absolute;right:-80px;bottom:-80px;width:320px;height:320px;background:rgba(255,255,255,.04);border-radius:50%}
    .login-deco2{position:absolute;right:80px;bottom:120px;width:140px;height:140px;background:rgba(255,255,255,.04);border-radius:50%}
    .login-title{font-size:22px;font-weight:700;margin-bottom:4px}
    .login-sub{color:var(--tm);font-size:13px;margin-bottom:28px}
    .login-err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:14px}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
    .fade{animation:fd .2s ease-out}
    @keyframes fd{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .flex{display:flex}.items-center{align-items:center}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
    .justify-between{justify-content:space-between}.justify-end{justify-content:flex-end}.flex-1{flex:1}.flex-wrap{flex-wrap:wrap}
    .font-mono{font-family:ui-monospace,monospace}.text-sm{font-size:13px}.text-xs{font-size:11px}
    .font-semibold{font-weight:600}.font-medium{font-weight:500}.font-bold{font-weight:700}
    .text-muted{color:var(--tm)}.text-teal{color:var(--p)}
    .mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mt-6{margin-top:24px}
    .mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}
    .mr-2{margin-right:8px}.ml-auto{margin-left:auto}
    .w-full{width:100%}.p-4{padding:16px}.p-5{padding:20px}.relative{position:relative}
    .truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .rounded-lg{border-radius:10px}.rounded-full{border-radius:9999px}
    .border{border:1px solid var(--bd)}.block{display:block}.inline-flex{display:inline-flex}
    .overflow-x-auto{overflow-x:auto}.overflow-y-auto{overflow-y:auto}
    .bg-teal{background:var(--pb)}.text-center{text-align:center}
    @media(max-width:1200px){.g4{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:900px){.g3{grid-template-columns:repeat(2,1fr)}.g2{grid-template-columns:1fr}}
    @media(max-width:640px){.g4{grid-template-columns:1fr}.g3{grid-template-columns:1fr}.login-left{display:none}.login-right{width:100%}}
  </style>
</head>

// ===== CHARTS =====
const PieChart=({data,size=200})=>{
  const total=data.reduce((s,d)=>s+d.value,0);let cum=0;
  const slices=data.map(d=>{const start=cum;cum+=d.value;return{...d,start,end:cum}});
  const r=size/2-10;const cx=size/2;const cy=size/2;
  const arc=(s,e)=>{const sa=s/total*Math.PI*2-Math.PI/2;const ea=e/total*Math.PI*2-Math.PI/2;const lg=e-s>total/2?1:0;
    return`M${cx+r*.6*Math.cos(sa)},${cy+r*.6*Math.sin(sa)} L${cx+r*Math.cos(sa)},${cy+r*Math.sin(sa)} A${r},${r} 0 ${lg} 1 ${cx+r*Math.cos(ea)},${cy+r*Math.sin(ea)} L${cx+r*.6*Math.cos(ea)},${cy+r*.6*Math.sin(ea)} A${r*.6},${r*.6} 0 ${lg} 0 ${cx+r*.6*Math.cos(sa)},${cy+r*.6*Math.sin(sa)} Z`};
  return <div className="flex items-center gap-4 flex-wrap" style={{justifyContent:'center'}}>
    <svg width={size} height={size}>{slices.map((s,i)=><path key={i} d={arc(s.start,s.end)} fill={s.color} stroke="#fff" strokeWidth="2"/>)}</svg>
    <div className="flex flex-col gap-2">{data.map((d,i)=><div key={i} className="flex items-center gap-2 text-xs"><span style={{width:9,height:9,borderRadius:'50%',background:d.color,display:'inline-block',flexShrink:0}}/><span className="text-muted">{d.label||d.name} <strong>({d.value})</strong></span></div>)}</div>
  </div>;
};

const BarChart=({data,valueKey,nameKey,colors,height=230})=>{
  const max=Math.max(...data.map(d=>d[valueKey]),1);
  const bw=Math.min(44,Math.floor(100/data.length*.65));
  return <svg viewBox={`0 0 ${data.length*60+20} ${height}`} style={{width:'100%',height}}>
    {data.map((d,i)=>{const h=(d[valueKey]/max)*(height-44);const x=i*60+18;const c=colors?colors[i]:'#0d9488';
      return <g key={i}>
        <rect x={x} y={height-34-h} width={bw} height={Math.max(h,2)} rx={4} fill={c} opacity=".9"/>
        <text x={x+bw/2} y={height-14} textAnchor="middle" fontSize="10" fill="#64748b">{d[nameKey]||d.name}</text>
        <text x={x+bw/2} y={height-38-h} textAnchor="middle" fontSize="10" fill="#374151" fontWeight="600">{d[valueKey]}</text>
      </g>;
    })}
  </svg>;
};

const LineChart=({data,lines,height=230,xKey='date'})=>{
  const allVals=lines.flatMap(l=>data.map(d=>d[l.key]));const max=Math.max(...allVals,1);const min=0;
  const w=data.length*24+40;const h=height-36;
  const pts=key=>data.map((d,i)=>`${i*24+30},${h-((d[key]-min)/(max-min))*h+8}`).join(' ');
  return <svg viewBox={`0 0 ${w} ${height}`} style={{width:'100%',height}}>
    {[0,.25,.5,.75,1].map((p,i)=><g key={i}><line x1={28} y1={h-p*h+8} x2={w} y2={h-p*h+8} stroke="#f1f5f9" strokeWidth="1"/><text x={2} y={h-p*h+12} fontSize="8" fill="#94a3b8">{Math.round(min+p*(max-min))}</text></g>)}
    {lines.map((l,li)=><polyline key={li} points={pts(l.key)} fill="none" stroke={l.color} strokeWidth="2" strokeLinejoin="round"/>)}
    {data.filter((_,i)=>i%2===0||data.length<8).map((d,i)=><text key={i} x={(i*2<data.length?i*2:i)*24+30} y={height-5} fontSize="8" fill="#94a3b8" textAnchor="middle">{d[xKey]?.slice(-5)}</text>)}
    <g transform={`translate(${w/2-60},2)`}>{lines.map((l,i)=><g key={i} transform={`translate(${i*80},0)`}><rect width={8} height={3} fill={l.color} y={3} rx={1}/><text x={12} fontSize="9" fill="#64748b" y={8}>{l.name}</text></g>)}</g>
  </svg>;
};

const Assets=()=>{
  const[items,sItems]=useState([]);const[total,sTotal]=useState(0);const[loading,sL]=useState(true);
  const[fT,sFT]=useState('all');const[fS,sFS]=useState('all');const[sq,sSQ]=useState('');const[sel,sSel]=useState(null);const[newM,sNewM]=useState(false);
  const load=()=>{sL(true);let q=`/api/assets?limit=50&type=${fT}&status=${fS}`;if(sq)q+=`&search=${encodeURIComponent(sq)}`;api.get(q).then(r=>{sItems(r.data||[]);sTotal(r.total||0);sL(false)})};
  useEffect(()=>{load()},[fT,fS,sq]);

  return <div className="fade" style={{display:'flex',flexDirection:'column',gap:16}}>

      <KPI icon="check" label="Aktiv" value={items.filter(a=>a.status==='active').length} color="#10b981"/>
      <KPI icon="settings" label="In Wartung" value={items.filter(a=>a.status==='maintenance').length} color="#f59e0b"/>
      <KPI icon="alertC" label="Ausgemustert" value={items.filter(a=>a.status==='retired').length} color="#64748b"/>

        <select className="inp" style={{width:'auto'}} value={fS} onChange={e=>sFS(e.target.value)}><option value="all">Alle Status</option><option value="active">Aktiv</option><option value="maintenance">Wartung</option><option value="inactive">Inaktiv</option><option value="retired">Ausgemustert</option></select>

            <tr key={a.id} onClick={()=>sSel(a)}>
              <td><span className="font-mono text-xs text-muted">{a.asset_tag}</span></td>
              <td><div className="flex items-center gap-2"><I n={typeIco[a.type]||'pkg'} s={14} c="text-muted"/><span className="font-medium text-sm">{a.name}</span></div></td>

              <td className="text-sm text-muted">{a.assigned_to_name||'—'}</td>
              <td className="text-sm text-muted">{a.location||'—'}</td>

      {sel&&<div className="g2">
        {[['Typ',<Badge label={sel.type} v="bi"/>],['Status',<SBadge s={sel.status}/>],['Seriennummer',sel.serial_number||'—'],['Standort',sel.location||'—'],['Zugewiesen',sel.assigned_to_name||'—'],['Abteilung',sel.department||'—'],['Kaufdatum',sel.purchase_date?.slice(0,10)||'—'],['Garantieende',sel.warranty_end?.slice(0,10)||'—'],['IP',sel.ip_address||'—'],['MAC',sel.mac_address||'—']].map(([l,v],i)=>(
          <div key={i}><div className="text-xs text-muted mb-1">{l}</div><div className="font-medium text-sm">{v}</div></div>))}
      </div>}
    </Modal>
    <Modal open={newM} onClose={()=>sNewM(false)} title="Neues Asset">
      <NewAsset onSave={async(f)=>{await api.post('/api/assets',f);sNewM(false);load()}}/>
    </Modal>
  </div>;
};

        {sb&&<div><div className="sb-logo-name">ServiceDesk Pro</div><div className="sb-logo-sub">v2.0</div></div>}
      </div>
      <nav className="sb-nav">
        {nav.map((section,si)=><Fragment key={si}>
          {sb&&<div className="sb-section">{section.section}</div>}
          {section.items.map(it=>(
            <button key={it.k} onClick={()=>sMod(it.k)} title={!sb?it.l:undefined} className={`nav-item ${mod===it.k?'active':''}`}>
              <I n={it.ic} s={16} c="nav-icon"/>
              {sb&&<span className="nav-label">{it.l}</span>}
            </button>))}
        </Fragment>)}
      </nav>
      <div className="sb-footer">
        <div className="user-row" onClick={()=>sShowProfile(true)} title="Mein Profil">
          <div className="uavatar">{initials(user.full_name||user.name)}</div>
          {sb&&<div style={{flex:1,minWidth:0}}><div className="uname truncate">{user.full_name||user.name}</div><div className="urole">{user.role}</div></div>}
          {sb&&<button onClick={e=>{e.stopPropagation();logout()}} title="Abmelden" style={{background:'none',border:'none',cursor:'pointer',color:'var(--st)',padding:4,borderRadius:6}}><I n="logout" s={14}/></button>}
        </div>
      </div>
    </aside>
    <div className="main">
      <div className="topbar">
        <div className="flex items-center gap-3">
          <button onClick={()=>sSB(!sb)} className="ico-btn"><I n="menu" s={18}/></button>
          <div className="search-wrap">
            <I n="search" s={14} c="search-ico"/>
            <input className="search-input" placeholder="Suchen…"/>
          </div>
        </div>
        <div className="tb-actions">
          <button className="ico-btn"><I n="bell" s={17}/><span className="ndot"/></button>
          <div className="tb-div"/>
          <div className="tb-user" onClick={()=>sShowProfile(true)} title="Mein Profil">
            <div className="tb-av">{initials(user.full_name||user.name)}</div>
            <span className="text-sm font-medium">{(user.full_name||user.name)?.split(' ')[0]}</span>
          </div>
        </div>
      </div>
      <div className="content">{view()}</div>
    </div>
  </div>
  {showProfile&&<Profile user={user} onClose={()=>sShowProfile(false)} onUpdate={u=>{sUser({...user,...u});}}/>};
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
